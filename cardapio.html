<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio - Olombaka Entretenimento</title>
  <link rel="icon" type="image/png" href="imagens/logo.jpg">
  
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: #fff;
      padding-top: 80px; /* espaço extra para não colar no nav */
    }

    .navbar {
      background: #FFD700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px; /* igual ao pedidos.html */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .logo img { height: 60px; } /* igual ao pedidos.html */

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin-left: auto;
      padding-right: 20px; /* igual ao pedidos.html */
    }
    .nav-links li a {
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    @media(max-width:768px){
      .nav-links{display:none;}
      .menu-toggle {
        display: block;
        background: linear-gradient(135deg,#FFD700,#FF4C4C);
        color:#111;
        border:none;
        padding:8px 14px;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
      }
    }

    .menu-toggle { display: none; } /* escondido em desktop */

    .mobile-menu {
      display:none;
      flex-direction:column;
      gap:15px;
      background:#111;
      padding:15px;
      position:absolute;
      top:65px;
      left:0;
      width:100%;
      z-index:999;
    }
    .mobile-menu li a {
      display:block;
      padding:10px;
      background:linear-gradient(135deg,#FFD700,#FF4C4C);
      color:#111;
      border-radius:6px;
      text-align:center;
    }

    /* Produtos */
    main { 
      display:flex; 
      flex-wrap:wrap; 
      gap:20px; 
      padding:30px; 
      justify-content:center; 
    }
    .product {
      background:#1a1a1a;
      border-radius:10px;
      padding:15px;
      text-align:center;
      width:250px;
      box-shadow:0 4px 8px rgba(0,0,0,0.3);
    }
    .product img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  background-color: #000; /* opcional para destacar bordas */
  border-radius: 8px;
  transition: all 0.3s ease;
}

.product {
  min-height: 350px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
    .product img:hover {
      filter: brightness(1.2);
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    }
    .product h3 { font-size:18px; margin:10px 0; color:#FFD700; }
    .price { font-size:16px; font-weight:bold; color:#FF4C4C; margin-bottom:10px; }
    .product button {
      background:linear-gradient(135deg,#FFD700,#FF4C4C);
      color:#111;
      border:none;
      padding:10px 20px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      transition:all 0.3s ease;
    }
    .product button:hover {
      background:linear-gradient(135deg,#FF4C4C,#007BFF);
      color:#fff;
      transform:scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Barra de navegação -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="imagens/logo.jpg" alt="Logo Olombaka">
      </a>
    </div>
    <button class="menu-toggle">☰</button>
    <ul class="nav-links">
      <li><a href="cardapio.html">Cardápio</a></li>
      <li><a href="pedidos.html">Pedidos</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="contactos.html">Contactos</a></li>   
      <li><a href="https://www.instagram.com/olombakaentretenimento" target="_blank">Instagram</a></li>
      <li>
        <a href="https://wa.me/244976194731" target="_blank">
          <img src="imagens/whatsapp-logo.jpg" alt="Posso ajudar?" style="height:20px;vertical-align:middle;margin-right:6px;">
          Posso ajudar?
        </a>
      </li>
    </ul>

    <ul class="mobile-menu">
      <li><a href="cardapio.html">Cardápio</a></li>
      <li><a href="pedidos.html">Pedidos</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="contactos.html">Contactos</a></li>   
      <li><a href="https://www.instagram.com/olombakaentretenimento" target="_blank">Instagram</a></li>
      <li>
        <a href="https://wa.me/244976194731" target="_blank">
          <img src="imagens/whatsapp-logo.jpg" alt="Posso ajudar?" style="height:20px;vertical-align:middle;margin-right:6px;">
          Posso ajudar?
        </a>
      </li>
    </ul>
  </nav>

  <!-- Produtos -->
  <main>
    <div class="product" data-categoria="entradas">
      <img src="imagens/gambas-panadas.jpg" alt="Gambas Panadas">
      <h3>Gambas Panados</h3>
      <p class="price">14.290,00 KZ</p>
      <button onclick="adicionarItem('gambas-panadas','Gambas Panadas',14290)">Adicionar</button>
    </div>
    <div class="product" data-categoria="carnes">
      <img src="imagens/bife-casa.jpg" alt="Bife da Casa">
      <h3>Bife da Casa</h3>
      <p class="price">9.500,00 KZ</p>
      <button onclick="adicionarItem('bife-casa','Bife da Casa',9500)">Adicionar</button>
    </div>
	<div class="product" data-categoria="Cervejas">
      <img src="imagens/lambreta.jpg" alt="Lambreta">
      <h3>Lambreta</h3>
      <p class="price">800,00 KZ</p>
      <button onclick="adicionarItem('lambreta','Lambreta',800)">Adicionar</button>
    </div>
	
	<div class="product" data-categoria="Cervejas">
      <img src="imagens/cucalata.jpg" alt="Cuca Lata">
      <h3>Cuca Lata</h3>
      <p class="price">1.500,00 KZ</p>
      <button onclick="adicionarItem('cucalata','Cuca Lata',1500)">Adicionar</button>
    </div>
	
    <div class="product" data-categoria="bebidas">
      <img src="imagens/cocacola.jpg" alt="Coca-Cola">
      <h3>Coca-Cola</h3>
      <p class="price">1.200,00 KZ</p>
      <button onclick="adicionarItem('coca-cola','Coca-Cola',1200)">Adicionar</button>
    </div>
  </main>

  <script>
    // ===== Menu Mobile toggle =====
    const menuToggle = document.querySelector('.menu-toggle');
    const mobileMenu = document.querySelector('.mobile-menu');
    menuToggle.addEventListener('click', () => {
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
    });

    // Fecha menu ao clicar em link
    document.querySelectorAll('.mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.style.display = 'none';
      });
    });

    // ===== Carrinho via localStorage =====
    function adicionarItem(id, nome, preco) {
      let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
      const existente = carrinho.find(item => item.id === id);
      if (existente) {
        existente.qtd += 1;
      } else {
        carrinho.push({ id, nome, preco, qtd: 1 });
      }
      localStorage.setItem('carrinho', JSON.stringify(carrinho));

      // Feedback institucional no botão
      const btn = document.querySelector(`button[onclick*="${id}"]`);
      if (btn) {
        btn.textContent = "✔ Adicionado";
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = "Adicionar";
          btn.disabled = false;
        }, 1500);
      }
    }
  </script>
</body>
</html>
