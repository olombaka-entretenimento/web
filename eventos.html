<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos | Olombaka Entretenimento</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="imagens/logo.jpg">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #111;
      color: #fff;
      padding-top: 80px; /* espaço entre nav e main */
    }

    .navbar {
      background: #FFD700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px; /* igual ao pedidos.html */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .logo img { height: 60px; } /* igual ao pedidos.html */

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin-left: auto;
      padding-right: 20px; /* igual ao pedidos.html */
    }
    .nav-links li a {
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    @media(max-width:768px){
      .nav-links{display:none;}
      .menu-toggle {
        display: block;
        background: linear-gradient(135deg,#FFD700,#FF4C4C);
        color:#111;
        border:none;
        padding:8px 14px;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
      }
    }

    .menu-toggle { display: none; } /* escondido em desktop */

    .mobile-menu {
      display:none;
      flex-direction:column;
      gap:15px;
      background:#111;
      padding:15px;
      position:absolute;
      top:65px;
      left:0;
      width:100%;
      z-index:999;
    }
    .mobile-menu li a {
      display:block;
      padding:10px;
      background:linear-gradient(135deg,#FFD700,#FF4C4C);
      color:#111;
      border-radius:6px;
      text-align:center;
    }

    /* Galeria de eventos */
    .galeria {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .galeria img {
      width: 300px;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .galeria img:hover {
      filter: brightness(1.2);
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    }
  </style>
</head>
<body>

<!-- Barra de navegação -->
<nav class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="imagens/logo.jpg" alt="Logo Olombaka">
    </a>
  </div>

  <button class="menu-toggle">☰</button>

  <ul class="nav-links">
    <li><a href="cardapio.html">Cardápio</a></li>
    <li><a href="pedidos.html">Pedidos</a></li>
    <li><a href="eventos.html">Eventos</a></li>
    <li><a href="contactos.html">Contactos</a></li>   
    <li><a href="https://www.instagram.com/olombakaentretenimento" target="_blank">Instagram</a></li>
    <li>
      <a href="https://wa.me/244976194731" target="_blank">
        <img src="imagens/whatsapp-logo.jpg" alt="Posso ajudar?" style="height:20px;vertical-align:middle;margin-right:6px;">
        Posso ajudar?
      </a>
    </li>
  </ul>

  <ul class="mobile-menu">
    <li><a href="cardapio.html">Cardápio</a></li>
    <li><a href="pedidos.html">Pedidos</a></li>
    <li><a href="eventos.html">Eventos</a></li>
    <li><a href="contactos.html">Contactos</a></li>   
    <li><a href="https://www.instagram.com/olombakaentretenimento" target="_blank">Instagram</a></li>
    <li>
      <a href="https://wa.me/244976194731" target="_blank">
        <img src="imagens/whatsapp-logo.jpg" alt="Posso ajudar?" style="height:20px;vertical-align:middle;margin-right:6px;">
        Posso ajudar?
      </a>
    </li>
  </ul>
</nav>

<!-- Conteúdo Eventos -->
<main>
  <section id="eventos">
    <h2>Eventos</h2>
    <p>Descobre os eventos especiais e noites temáticas da Olombaka Entretenimento.</p>
    <div class="galeria">
      <a href="fute2026.html">
        <img src="imagens/Fute2026.jpg" alt="Noite de Música ao Vivo">
      </a>
      <img src="imagens/evento2.jpg" alt="Festival Gastronómico">
      <img src="imagens/evento3.jpg" alt="Aniversário Olombaka">
    </div>
  </section>
</main>

<script>
  // Menu Mobile
  const menuToggle = document.querySelector('.menu-toggle');
  const mobileMenu = document.querySelector('.mobile-menu');

  menuToggle.addEventListener('click', () => {
    mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
  });

  document.querySelectorAll('.mobile-menu a').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.style.display = 'none';
    });
  });

  document.addEventListener('click', (e) => {
    if (mobileMenu.style.display === 'flex' && !mobileMenu.contains(e.target) && e.target !== menuToggle) {
      mobileMenu.style.display = 'none';
    }
  });
</script>

</body>
</html>
