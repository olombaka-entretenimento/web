<!-- Conteúdo principal -->
<main>
  <section class="ambiente">
    <h1 style="text-align:center; color:#FFD700;">Página de Teste</h1>
    <p style="text-align:center;">Testando galeria, modal e menu Pilot.</p>

    <!-- Galeria -->
    <div class="galeria">
      <img src="imagens/insideout2.jpg" alt="Divertida Mente 2"
           data-filme="insideout2" data-link="filme.html"
           data-desc="Inside Out 2 - Animação | +6 | 1h40">
      <img src="imagens/caramelo.jpg" alt="Caramelo"
           data-filme="caramelo" data-link="filme.html"
           data-desc="Caramelo - Comédia dramática | +12 | 1h50">
    </div>
  </section>
</main>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <img id="poster" src="" alt="Poster do Filme">
    <div class="detalhes">
      <h3 id="titulo"></h3>
      <p id="detalhes"></p>
      <a id="modal-link" href="#" class="btn-saiba">Saiba mais...</a>
    </div>
  </div>
</div>

<!-- Script -->
<script>
const filmesDetalhes = {
  insideout2:{
    poster:"imagens/insideout2.jpg",
    titulo:"Divertida Mente 2",
    detalhes:"Na mente de Riley, recém-chegada à adolescência, novas Emoções surgem. Animação | +6 | 1h40 | Datas: 6,7,13,14,20,21 Março | Horários: 13h,15h"
  },
  caramelo:{
    poster:"imagens/caramelo.jpg",
    titulo:"Caramelo",
    detalhes:"Um jovem chef encontra esperança na amizade com um cão fantástico. Comédia dramática | +12 | 1h50 | Datas: 7,14,21,28 Março | Horários: 15h"
  }
};

// Seletores do modal
const modal = document.getElementById("modal");
const poster = document.getElementById("poster");
const titulo = document.getElementById("titulo");
const detalhes = document.getElementById("detalhes");
const modalLink = document.getElementById("modal-link");
const closeBtn = document.querySelector(".close");

// Evento de clique na galeria
document.querySelectorAll(".galeria img").forEach(img => {
  img.addEventListener("click", () => {
    const filmeId = img.dataset.filme;
    const filme = filmesDetalhes[filmeId];
    poster.src = filme.poster;
    titulo.textContent = filme.titulo;
    detalhes.textContent = filme.detalhes;
    modalLink.href = img.dataset.link;
    modal.style.display = "flex";
  });
});

// Fechar modal
closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
});
window.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
});

// Menu Mobile Pilot
const menuToggle = document.querySelector('.menu-toggle');
const mobileMenu = document.querySelector('.mobile-menu');

menuToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  mobileMenu.classList.toggle('active');
});

document.querySelectorAll('.mobile-menu a').forEach(link => {
  link.addEventListener('click', () => {
    mobileMenu.classList.remove('active');
  });
});

document.addEventListener('click', (e) => {
  if (mobileMenu.classList.contains('active') &&
      !mobileMenu.contains(e.target) &&
      e.target !== menuToggle) {
    mobileMenu.classList.remove('active');
  }
});
</script>
